<style>
:root {
  --bg: #0a0b0f;
  --surface: #12131a;
  --surface-hover: #1a1b25;
  --border: #1e2030;
  --text: #e8e9ed;
  --text-dim: #7a7d8e;
  --accent: #3b82f6;
  --g1: #22c55e; --g1-bg: rgba(34,197,94,0.08);
  --g2: #8b5cf6; --g2-bg: rgba(139,92,246,0.08);
  --g3: #f59e0b; --g3-bg: rgba(245,158,11,0.08);
  --g4: #ef4444; --g4-bg: rgba(239,68,68,0.08);
  --g5: #ec4899; --g5-bg: rgba(236,72,153,0.08);
  --g6: #06b6d4; --g6-bg: rgba(6,182,212,0.08);
  --g7: #f97316; --g7-bg: rgba(249,115,22,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; line-height:1.6; overflow-x:hidden; }

.hero { position:relative; padding:80px 40px 60px; text-align:center; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(59,130,246,0.12),transparent); pointer-events:none; }
.hero h1 { font-family:'Fraunces',serif; font-size:clamp(2.4rem,5vw,4rem); font-weight:700; letter-spacing:-0.02em; margin-bottom:12px; }
.hero .subtitle { color:var(--text-dim); font-size:1.1rem; margin-bottom:32px; }

.stats-bar { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; margin-bottom:40px; }
.stat { text-align:center; }
.stat-num { font-family:'Fraunces',serif; font-size:2rem; font-weight:700; color:var(--accent); }
.stat-label { font-size:0.8rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; }

.tab-bar { display:flex; justify-content:center; gap:8px; padding:0 24px; margin-bottom:48px; flex-wrap:wrap; }
.tab-btn { padding:8px 20px; border:1px solid var(--border); border-radius:24px; background:transparent; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.25s; }
.tab-btn:hover,.tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.view-toggle { display:flex; justify-content:center; gap:8px; margin-bottom:32px; flex-wrap:wrap; }
.view-btn { padding:6px 16px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
.view-btn.active { background:var(--surface-hover); color:var(--text); border-color:var(--text-dim); }

.group-section { padding:0 24px 64px; max-width:1400px; margin:0 auto; }
.group-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.group-badge { display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:12px; font-family:'Fraunces',serif; font-weight:700; font-size:0.9rem; color:#fff; }
.group-title { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:700; }
.group-count { color:var(--text-dim); font-size:0.85rem; margin-left:auto; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.biz-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:all 0.3s ease; cursor:pointer; text-decoration:none; color:inherit; display:block; }
.biz-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 12px 40px rgba(0,0,0,0.3); }

.card-img { height:180px; position:relative; overflow:hidden; background:var(--surface); }
.card-img img { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
.card-img .fallback { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.card-img .fallback .fb-name { font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700; color:rgba(255,255,255,0.85); text-align:center; padding:0 16px; text-shadow:0 1px 4px rgba(0,0,0,0.3); }
.card-img .fallback .fb-host { font-size:0.72rem; color:rgba(255,255,255,0.45); font-family:monospace; }
.card-visit { position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; text-decoration:none; transition:all 0.2s; opacity:0; z-index:10; }
.biz-card:hover .card-visit { opacity:1; }
.card-visit:hover { background:var(--accent); border-color:var(--accent); }
.card-body { padding:16px 20px 20px; }
.card-body h3 { font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700; margin-bottom:4px; }
.card-body .slug { color:var(--text-dim); font-size:0.78rem; font-family:monospace; margin-bottom:8px; }
.card-body .meta { display:flex; gap:8px; flex-wrap:wrap; }
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:0.7rem; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
.badge-active,.badge-live { background:rgba(34,197,94,0.15); color:#22c55e; }
.badge-planned { background:rgba(59,130,246,0.15); color:#3b82f6; }
.badge-verifying { background:rgba(245,158,11,0.15); color:#f59e0b; }
.url-count-badge { background:rgba(255,255,255,0.05); color:var(--text-dim); }

/* PLATFORM MATRIX VIEW */
.matrix-section { padding:0 24px 64px; max-width:1600px; margin:0 auto; }
.matrix-header { margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.matrix-header h2 { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:700; }
.matrix-search { padding:8px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; width:280px; }
.matrix-search:focus { outline:none; border-color:var(--accent); }

.matrix-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.matrix-table th { text-align:left; padding:10px 14px; border-bottom:2px solid var(--border); color:var(--text-dim); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; white-space:nowrap; }
.matrix-table td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:top; }
.matrix-table tr:hover td { background:var(--surface-hover); }
.matrix-group-row td { background:var(--surface); padding:12px 14px; font-family:'Fraunces',serif; font-weight:700; font-size:1rem; border-bottom:1px solid var(--border); }

.url-chip { display:inline-flex; align-items:center; gap:5px; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:3px 8px; font-family:monospace; font-size:0.72rem; color:var(--text-dim); text-decoration:none; transition:all 0.15s; margin:2px 2px 2px 0; }
.url-chip:hover { border-color:var(--accent); color:var(--text); }
.url-chip.canonical { border-color:rgba(34,197,94,0.4); color:#22c55e; }
.url-chip.vercel { border-color:rgba(59,130,246,0.35); color:#60a5fa; }
.url-chip.lovable { border-color:rgba(236,72,153,0.35); color:#f472b6; }
.url-chip.github { border-color:rgba(107,114,128,0.4); color:#9ca3af; }
.url-chip.custom { border-color:rgba(245,158,11,0.35); color:#fbbf24; }
.url-chip.verifying { border-color:rgba(245,158,11,0.3); color:#f59e0b; opacity:0.7; }

.plat-icon { font-size:0.75rem; opacity:0.7; }

.biz-name-cell { font-weight:600; font-size:0.88rem; }
.biz-slug-cell { font-family:monospace; font-size:0.72rem; color:var(--text-dim); margin-top:2px; }
.status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
.dot-live { background:#22c55e; }
.dot-planned { background:#3b82f6; }
.dot-verifying { background:#f59e0b; }

/* DOMAIN VIEW */
.domain-section { padding:0 24px 64px; max-width:1400px; margin:0 auto; }
.domain-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.domain-table th { text-align:left; padding:12px 16px; border-bottom:2px solid var(--border); color:var(--text-dim); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; }
.domain-table td { padding:10px 16px; border-bottom:1px solid var(--border); }
.domain-table tr:hover td { background:var(--surface-hover); }
.domain-url { color:var(--accent); text-decoration:none; font-family:monospace; font-size:0.8rem; }
.domain-url:hover { text-decoration:underline; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:none; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(4px); }
.modal-overlay.active { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; max-width:940px; width:100%; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; }
.modal-header { display:flex; align-items:center; gap:16px; padding:24px 28px; border-bottom:1px solid var(--border); }
.modal-header h2 { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:700; flex:1; }
.modal-header .close-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; font-size:1.2rem; transition:all 0.2s; }
.modal-header .close-btn:hover { background:var(--surface-hover); color:var(--text); }
.modal-body { padding:28px; overflow-y:auto; flex:1; }
.modal-screenshot { width:100%; height:220px; border-radius:12px; overflow:hidden; margin-bottom:24px; background:var(--bg); }
.modal-screenshot img { width:100%; height:100%; object-fit:cover; object-position:top center; }
.modal-screenshot .fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:1.2rem; color:var(--text-dim); }
.modal-tabs { display:flex; gap:8px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px; }
.modal-tab { padding:8px 16px; border:none; background:transparent; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; border-radius:6px; transition:all 0.2s; }
.modal-tab:hover { color:var(--text); }
.modal-tab.active { background:var(--accent); color:#fff; }
.modal-content { display:none; }
.modal-content.active { display:block; }
.info-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; }
.info-item { background:var(--bg); border-radius:10px; padding:14px 16px; }
.info-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-dim); margin-bottom:4px; }
.info-value { font-size:0.9rem; font-weight:500; word-break:break-all; }
.info-value a { color:var(--accent); text-decoration:none; }
.info-value a:hover { text-decoration:underline; }
.info-value.mono { font-family:monospace; font-size:0.8rem; }
.platform-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.modal-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; gap:12px; justify-content:flex-end; }
.modal-btn { padding:10px 20px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; text-decoration:none; }
.modal-btn-primary { background:var(--accent); color:#fff; border:none; }
.modal-btn-primary:hover { background:#2563eb; }
.modal-btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.modal-btn-secondary:hover { background:var(--surface-hover); }

footer { text-align:center; padding:48px 24px; color:var(--text-dim); font-size:0.8rem; border-top:1px solid var(--border); }
footer code { background:var(--surface); padding:2px 6px; border-radius:4px; font-size:0.75rem; }
</style>

<script>
/* ================================================================
   CONFIG
   ================================================================ */
var BRIDGE_URL = 'https://m5oqj21chd.execute-api.ap-southeast-2.amazonaws.com/lambda/invoke';
var BRIDGE_KEY = 'bk_tOH8P5WD3mxBKfICa4yI56vJhpuYOynfdf1d_GfvdK4';

var groupMeta = {
  G1:{name:'CORE',color:'var(--g1)',desc:'Foundation — AI coaching, orchestration, holding'},
  G2:{name:'SIGNAL',color:'var(--g2)',desc:'Governance, consent, BCI, signal stack, research'},
  G3:{name:'MISSION',color:'var(--g3)',desc:'Mission-driven — health, pharma, water, agriculture'},
  G4:{name:'RETAIL',color:'var(--g4)',desc:'Commercial & trade — market entry, retail, logistics'},
  G5:{name:'FUN',color:'var(--g5)',desc:'Entertainment, games, satire, consumer apps'},
  G6:{name:'PERSONAL',color:'var(--g6)',desc:'Personal tools — CV, tax, property, career'},
  G7:{name:'IP',color:'var(--g7)',desc:'Books, research, courses, IP assets, publications'}
};
var colorHex = {G1:'#22c55e',G2:'#8b5cf6',G3:'#f59e0b',G4:'#ef4444',G5:'#ec4899',G6:'#06b6d4',G7:'#f97316'};

/* Override display names — canonical 28 alignment */
var displayNameOverrides = {
  'medledger': 'MedLedger (All Chemist)',
  'chemists-platform': 'All Chemist',
  'augmented-humanity-coach': 'Augmented Humanity Coach',
  'aiq-ai-olympics': 'AI Olympics',
  'gc-bat-core': 'GC-BAT Core'
};

/* Extra platform URLs known but not yet in registry */
var extraUrls = {
  'medledger': [
    {url:'https://all-chemist-org.lovable.app', platform:'lovable', status:'live'},
    {url:'https://all-chemists.com.tech4humanity.com.au', platform:'custom', status:'live'},
    {url:'https://all-chemist.org', platform:'custom', status:'verifying'}
  ],
  'chemists-platform': [
    {url:'https://allchemist.org', platform:'canonical', status:'live'},
    {url:'https://all-chemist-org.lovable.app', platform:'lovable', status:'live'},
    {url:'https://all-chemists.com.tech4humanity.com.au', platform:'custom', status:'live'},
    {url:'https://all-chemist.org', platform:'custom', status:'verifying'}
  ]
};

var businesses = [];
var siteIndex = {}; // slug → [{url, platform, status}]

/* ================================================================
   BRIDGE HELPER
   ================================================================ */
async function bridgeSQL(sql) {
  var res = await fetch(BRIDGE_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':BRIDGE_KEY},
    body:JSON.stringify({fn:'troy-sql-executor',sql:sql})
  });
  var d = await res.json();
  return d.rows || [];
}

/* ================================================================
   LOAD DATA
   ================================================================ */
async function loadAll() {
  var statusEl = document.getElementById('liveStatus');
  statusEl.textContent = 'Loading…';
  try {
    // Primary: repo structure map (canonical source of truth)
    var rows = await bridgeSQL(
      "SELECT business_slug as slug, business_name as name, group_code as grp, " +
      "public_url_canonical as canonical, vercel_project as vercel, github_repo as github " +
      "FROM t4h_repo_structure_map WHERE source_version='v1.1' ORDER BY group_code, business_slug"
    );

    // Secondary: extra sites from infra_sites_registry
    var siteRows = await bridgeSQL(
      "SELECT slug, display_name, primary_url, hosting, status, mapped_business_id " +
      "FROM infra_sites_registry WHERE status IN ('READY','ACTIVE','LIVE') ORDER BY mapped_business_id, primary_url"
    );

    // Build site index by mapped_business_id
    siteRows.forEach(function(s) {
      var key = String(s.mapped_business_id || '');
      if (!siteIndex[key]) siteIndex[key] = [];
      siteIndex[key].push({url: s.primary_url, platform: s.hosting || 'web', status: 'live', label: s.display_name});
    });

    // Build business list
    businesses = rows.map(function(r, i) {
      var slug = r.slug || '';
      var name = displayNameOverrides[slug] || r.name || slug;
      var canonical = r.canonical || '';
      if (canonical && !/^https?:\/\//i.test(canonical)) canonical = 'https://' + canonical;
      var vercelUrl = r.vercel ? 'https://' + r.vercel + '.vercel.app' : null;
      var githubUrl = r.github ? 'https://github.com/TML-4PM/' + r.github : null;

      // Build all platform URLs
      var platforms = [];
      if (canonical) platforms.push({url:canonical, platform:'canonical', status:'live'});
      if (vercelUrl) platforms.push({url:vercelUrl, platform:'vercel', status:'live'});
      if (githubUrl) platforms.push({url:githubUrl, platform:'github', status:'repo'});
      // Add extras (hardcoded known URLs not yet in DB)
      if (extraUrls[slug]) extraUrls[slug].forEach(function(e) {
        if (!platforms.find(function(p){return p.url===e.url;})) platforms.push(e);
      });

      return {
        id: i + 1,
        slug: slug,
        name: name,
        group: r.grp || 'G7',
        canonical: canonical,
        ss: canonical || null,
        platforms: platforms,
        vercel: r.vercel || null,
        github: r.github || null
      };
    });

    // Update stats
    document.getElementById('statBiz').textContent = businesses.length;
    var totalUrls = businesses.reduce(function(s,b){return s+b.platforms.length;},0);
    document.getElementById('statUrls').textContent = totalUrls;
    document.getElementById('statLive').textContent = businesses.filter(function(b){return b.canonical;}).length;
    document.getElementById('statVercel').textContent = businesses.filter(function(b){return b.vercel;}).length;

    statusEl.textContent = '● Live · ' + businesses.length + ' businesses · ' + totalUrls + ' total URLs · t4h_repo_structure_map v1.1';

    renderPortfolio(window._activeFilter || 'all');
    if (document.getElementById('matrixView').style.display !== 'none') renderMatrix();
    if (document.getElementById('domainView').style.display !== 'none') renderDomainMap();

  } catch(err) {
    statusEl.textContent = '⚠ ' + err.message;
    console.error(err);
  }
}

function screenshotSrc(url) {

/* ================================================================
   PORTFOLIO VIEW
   ================================================================ */
function renderCard(biz) {
  var c = colorHex[biz.group] || '#3b82f6';
  var grad = 'linear-gradient(135deg,' + c + '18 0%,' + c + '38 50%,' + c + '58 100%)';
  var host = '';
  try { host = new URL(biz.canonical).hostname; } catch(e) { host = biz.slug; }

  var imgHtml;
  if (biz.ss) {
    imgHtml = '<img src="' + screenshotSrc(biz.ss) + '" alt="' + biz.name + '" loading="lazy" ' +
      'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div class="fallback" style="display:none;background:' + grad + '"><div class="fb-name">' + biz.name + '</div><div class="fb-host">' + host + '</div></div>';
  } else {
    imgHtml = '<div class="fallback" style="display:flex;background:' + grad + '"><div class="fb-name">' + biz.name + '</div><div class="fb-host">' + biz.slug + '</div></div>';
  }

  var urlCount = biz.platforms.filter(function(p){return p.platform!=='github';}).length;

  return '<div class="biz-card" data-group="' + biz.group + '" onclick="openModal(' + biz.id + ')">' +
    '<div class="card-img">' + imgHtml +
      (biz.canonical ? '<a class="card-visit" href="' + biz.canonical + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a>' : '') +
    '</div>' +
    '<div class="card-body">' +
      '<h3>' + biz.name + '</h3>' +
      '<div class="slug">' + biz.slug + '</div>' +
      '<div class="meta">' +
        '<span class="badge badge-' + (biz.canonical ? 'live' : 'planned') + '">' + (biz.canonical ? 'LIVE' : 'PLANNED') + '</span>' +
        (urlCount > 1 ? '<span class="badge url-count-badge">' + urlCount + ' URLs</span>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderPortfolio(filter) {
  var container = document.getElementById('portfolioView');
  var html = '';
  ['G1','G2','G3','G4','G5','G6','G7'].forEach(function(g) {
    if (filter !== 'all' && filter !== g) return;
    var gm = groupMeta[g];
    var groupBiz = businesses.filter(function(b){return b.group===g;});
    html += '<div class="group-section" data-group="' + g + '">' +
      '<div class="group-header">' +
        '<div class="group-badge" style="background:' + gm.color + '">' + g + '</div>' +
        '<div><div class="group-title">' + gm.name + '</div><div style="color:var(--text-dim);font-size:0.85rem">' + gm.desc + '</div></div>' +
        '<div class="group-count">' + groupBiz.length + ' businesses</div>' +
      '</div>' +
      '<div class="cards-grid">' + groupBiz.map(renderCard).join('') + '</div>' +
    '</div>';
  });
  container.innerHTML = html || '<div style="padding:64px;text-align:center;color:var(--text-dim)">Loading…</div>';
}

/* ================================================================
   PLATFORM MATRIX VIEW
   ================================================================ */
function renderMatrix() {
  var container = document.getElementById('matrixView');
  var html = '<div class="matrix-header">' +
    '<div>' +
      '<h2>Platform URL Matrix</h2>' +
      '<p style="color:var(--text-dim);font-size:0.85rem;margin-top:4px">All known locations for every business — canonical, Vercel, Lovable, custom domains</p>' +
    '</div>' +
    '<input class="matrix-search" type="text" placeholder="Search business or URL…" oninput="filterMatrix(this.value)" id="matrixSearch">' +
  '</div>' +
  '<div style="overflow-x:auto">' +
  '<table class="matrix-table" id="matrixTable">' +
  '<thead><tr>' +
    '<th>#</th>' +
    '<th>Business</th>' +
    '<th>Canonical</th>' +
    '<th>Vercel</th>' +
    '<th>Lovable</th>' +
    '<th>Custom Domains</th>' +
    '<th>GitHub</th>' +
  '</tr></thead>' +
  '<tbody id="matrixBody">' +
  buildMatrixRows(businesses) +
  '</tbody></table></div>';
  container.innerHTML = html;
}

function buildMatrixRows(bizList) {
  var html = '';
  var lastGroup = '';
  var i = 0;
  bizList.forEach(function(biz) {
    if (biz.group !== lastGroup) {
      var gm = groupMeta[biz.group];
      html += '<tr class="matrix-group-row"><td colspan="7">' +
        '<span style="display:inline-block;width:28px;height:28px;border-radius:6px;background:' + colorHex[biz.group] + ';color:#fff;text-align:center;line-height:28px;font-size:0.75rem;margin-right:10px;vertical-align:middle">' + biz.group + '</span>' +
        gm.name + ' — ' + gm.desc +
      '</td></tr>';
      lastGroup = biz.group;
    }
    i++;

    var canonical = biz.platforms.find(function(p){return p.platform==='canonical';});
    var vercelPlatforms = biz.platforms.filter(function(p){return p.platform==='vercel';});
    var lovablePlatforms = biz.platforms.filter(function(p){return p.platform==='lovable';});
    var customPlatforms = biz.platforms.filter(function(p){return p.platform==='custom';});
    var githubPlatforms = biz.platforms.filter(function(p){return p.platform==='github';});

    function chip(p, cls) {
      var short = p.url.replace(/^https?:\/\//,'');
      return '<a href="' + p.url + '" target="_blank" class="url-chip ' + cls + (p.status==='verifying'?' verifying':'') + '" title="' + p.url + '">' +
        short + (p.status==='verifying'?' ⏳':'') +
      '</a>';
    }

    html += '<tr data-search="' + (biz.name + ' ' + biz.slug + ' ' + biz.platforms.map(function(p){return p.url;}).join(' ')).toLowerCase() + '">' +
      '<td style="color:var(--text-dim);font-family:monospace;font-size:0.75rem">' + i + '</td>' +
      '<td><div class="biz-name-cell">' + biz.name + '</div><div class="biz-slug-cell">' + biz.slug + '</div></td>' +
      '<td>' + (canonical ? chip(canonical,'canonical') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
      '<td>' + (vercelPlatforms.length ? vercelPlatforms.map(function(p){return chip(p,'vercel');}).join('') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
      '<td>' + (lovablePlatforms.length ? lovablePlatforms.map(function(p){return chip(p,'lovable');}).join('') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
      '<td>' + (customPlatforms.length ? customPlatforms.map(function(p){return chip(p,'custom');}).join('') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
      '<td>' + (githubPlatforms.length ? githubPlatforms.map(function(p){return chip(p,'github');}).join('') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
    '</tr>';
  });
  return html;
}

function filterMatrix(q) {
  q = q.toLowerCase();
  var rows = document.querySelectorAll('#matrixBody tr:not(.matrix-group-row)');
  rows.forEach(function(row) {
    var match = !q || (row.getAttribute('data-search') || '').indexOf(q) > -1;
    row.style.display = match ? '' : 'none';
  });
}

/* ================================================================
   DOMAIN MAP VIEW (legacy)
   ================================================================ */
function renderDomainMap() {
  var container = document.getElementById('domainView');
  var rows = '';
  ['G1','G2','G3','G4','G5','G6','G7'].forEach(function(g) {
    var gm = groupMeta[g];
    var groupBiz = businesses.filter(function(b){return b.group===g;});
    rows += '<tr><td colspan="3" style="background:var(--surface);padding:12px 16px;font-family:Fraunces,serif;font-weight:700">' +
      '<span style="display:inline-block;width:28px;height:28px;border-radius:6px;background:' + colorHex[g] + ';color:#fff;text-align:center;line-height:28px;font-size:0.75rem;margin-right:8px;vertical-align:middle">' + g + '</span>' +
      gm.name + '</td></tr>';
    groupBiz.forEach(function(biz) {
      var nonGithub = biz.platforms.filter(function(p){return p.platform!=='github';});
      rows += '<tr>' +
        '<td style="font-weight:500">' + biz.name + '</td>' +
        '<td>' + (biz.canonical ? '<a class="domain-url" href="' + biz.canonical + '" target="_blank">' + biz.canonical.replace(/^https?:\/\//,'') + '</a>' : '<span style="color:var(--text-dim)">—</span>') + '</td>' +
        '<td>' + (nonGithub.length > 1 ? nonGithub.filter(function(p){return p.platform!=='canonical';}).map(function(p){
          return '<a class="domain-url" href="' + p.url + '" target="_blank" style="margin-right:8px;' + (p.status==='verifying'?'opacity:0.6':'') + '">' + p.url.replace(/^https?:\/\//,'') + (p.status==='verifying'?' ⏳':'') + '</a>';
        }).join('') : '<span style="color:var(--text-dim);font-size:0.75rem">—</span>') + '</td>' +
      '</tr>';
    });
  });
  container.innerHTML = '<table class="domain-table">' +
    '<thead><tr><th>Business</th><th>Canonical URL</th><th>Other Locations</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

/* ================================================================
   UI CONTROLLERS
   ================================================================ */
function filterGroup(group, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  if (btn) btn.classList.add('active');
  window._activeFilter = group;
  renderPortfolio(group);
}

function showView(view) {
  document.querySelectorAll('.view-btn').forEach(function(b){b.classList.remove('active');});
  ['portfolioView','matrixView','domainView'].forEach(function(id){
    document.getElementById(id).style.display='none';
  });
  document.getElementById('tabBar').style.display = 'none';

  if (view==='portfolio') {
    document.getElementById('portfolioView').style.display='block';
    document.getElementById('tabBar').style.display='flex';
    document.querySelectorAll('.view-btn')[0].classList.add('active');
  } else if (view==='matrix') {
    document.getElementById('matrixView').style.display='block';
    document.querySelectorAll('.view-btn')[1].classList.add('active');
    if (businesses.length) renderMatrix();
  } else if (view==='domain') {
    document.getElementById('domainView').style.display='block';
    document.querySelectorAll('.view-btn')[2].classList.add('active');
    if (businesses.length) renderDomainMap();
  }
}

/* ================================================================
   MODAL
   ================================================================ */
function openModal(bizId) {
  var biz = businesses.find(function(b){return b.id===bizId;});
  if (!biz) return;
  var c = colorHex[biz.group] || '#3b82f6';
  var gm = groupMeta[biz.group];

  document.getElementById('modalBadge').style.background = c;
  document.getElementById('modalBadge').textContent = biz.group;
  document.getElementById('modalTitle').textContent = biz.name;

  // Screenshot
  var ssContainer = document.getElementById('modalScreenshot');
  if (biz.ss) {
    ssContainer.innerHTML = '<img src="' + screenshotSrc(biz.ss) + '" alt="' + biz.name + '" onerror="this.parentElement.innerHTML=\'<div class=fallback>' + biz.name + '</div>\'">';
  } else {
    var grad = 'linear-gradient(135deg,' + c + '25 0%,' + c + '45 100%)';
    ssContainer.innerHTML = '<div class="fallback" style="background:' + grad + '">' + biz.name + '</div>';
  }

  // Overview tab
  var host = '';
  try { host = new URL(biz.canonical).hostname; } catch(e) { host = biz.slug; }
  document.getElementById('businessInfo').innerHTML =
    '<div class="info-item"><div class="info-label">Group</div><div class="info-value">' + biz.group + ' — ' + gm.name + '</div></div>' +
    '<div class="info-item"><div class="info-label">Status</div><div class="info-value"><span class="badge badge-' + (biz.canonical?'live':'planned') + '">' + (biz.canonical?'LIVE':'PLANNED') + '</span></div></div>' +
    '<div class="info-item"><div class="info-label">Canonical URL</div><div class="info-value"><a href="' + biz.canonical + '" target="_blank">' + host + '</a></div></div>' +
    '<div class="info-item"><div class="info-label">Total Locations</div><div class="info-value">' + biz.platforms.length + '</div></div>';

  // All Locations tab
  function platformLabel(p) {
    var icons = {canonical:'🌐',vercel:'▲',lovable:'💜',github:'🐙',custom:'🔗',web:'🌍'};
    return (icons[p.platform]||'🔗') + ' ' + p.platform.charAt(0).toUpperCase() + p.platform.slice(1);
  }
  var platHtml = '<div style="display:flex;flex-direction:column;gap:10px">';
  var grouped = {};
  biz.platforms.forEach(function(p) {
    if (!grouped[p.platform]) grouped[p.platform] = [];
    grouped[p.platform].push(p);
  });
  ['canonical','vercel','lovable','custom','github','web'].forEach(function(plat) {
    if (!grouped[plat]) return;
    platHtml += '<div style="background:var(--bg);border-radius:10px;padding:14px 16px">' +
      '<div class="info-label" style="margin-bottom:8px">' + platformLabel({platform:plat}) + '</div>';
    grouped[plat].forEach(function(p) {
      platHtml += '<a href="' + p.url + '" target="_blank" class="url-chip ' + plat + '" style="font-size:0.82rem;padding:5px 10px">' +
        p.url.replace(/^https?:\/\//,'') + (p.status==='verifying'?' ⏳ verifying':'') + '</a>';
    });
    platHtml += '</div>';
  });
  platHtml += '</div>';
  document.getElementById('platformsInfo').innerHTML = platHtml;

  // Technical tab
  document.getElementById('technicalInfo').innerHTML =
    '<div class="info-item"><div class="info-label">Slug</div><div class="info-value mono">' + biz.slug + '</div></div>' +
    '<div class="info-item"><div class="info-label">Vercel Project</div><div class="info-value mono">' + (biz.vercel || '—') + '</div></div>' +
    '<div class="info-item"><div class="info-label">GitHub Repo</div><div class="info-value mono">' + (biz.github ? '<a href="https://github.com/TML-4PM/' + biz.github + '" target="_blank">TML-4PM/' + biz.github + '</a>' : '—') + '</div></div>' +
    '<div class="info-item"><div class="info-label">Group</div><div class="info-value">' + biz.group + '</div></div>';

  document.getElementById('modalVisitBtn').href = biz.canonical || '#';
  showModalTab('business', document.querySelector('.modal-tab'));
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function showModalTab(tabId, btn) {
  document.querySelectorAll('.modal-tab').forEach(function(t){t.classList.remove('active');});
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.modal-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-' + tabId).classList.add('active');
}

document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeModal(); });

loadAll();
</script>
